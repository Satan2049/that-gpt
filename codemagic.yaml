# Codemagic CI for ChatNest (Tauri 2) — iOS only
# Docs: https://docs.codemagic.io/yaml/yaml-getting-started/
#
# Setup in Codemagic UI:
# 1. Connect this repository
# 2. iOS: add App Store Connect API key or upload signing certificates

workflows:
  chatnest-ios:
    name: ChatNest iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      vars:
        BUNDLE_ID: "com.chatnest.app"
    scripts:
      - name: Install Rust
        script: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "PATH=\"$HOME/.cargo/bin:\$PATH\"" >> "$CM_ENV"
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim
      - name: Install npm dependencies
        script: npm install
      - name: Initialize iOS project (if not committed yet)
        script: |
          source "$HOME/.cargo/env"
          if [ ! -d "src-tauri/gen/apple" ]; then
            npm run ios:init
          fi
      - name: Build iOS app
        script: |
          source "$HOME/.cargo/env"
          npm run ios:build
    artifacts:
      - src-tauri/gen/apple/build/**/*.ipa
      - src-tauri/gen/apple/build/**/*.app
